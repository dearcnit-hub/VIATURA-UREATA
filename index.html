<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Viatura - URE Araçatuba</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Mantenha todo o seu estilo CSS aqui igual ao original */
        :root { --primary: #1e293b; --secondary: #334155; --accent: #2563eb; --accent-hover: #1d4ed8; --success: #10b981; --danger: #ef4444; --warning: #f59e0b; --bg-body: #f1f5f9; --card-bg: #ffffff; --spin-color: #0ea5e9; --onix-color: #8b5cf6; --text-main: #0f172a; --text-muted: #64748b; --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06); --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1); --radius: 12px; --border: #e2e8f0; --whatsapp: #25d366; }
        body.dark-mode { --primary: #f1f5f9; --secondary: #94a3b8; --accent: #60a5fa; --accent-hover: #93c5fd; --bg-body: #0f172a; --card-bg: #1e293b; --text-main: #f8fafc; --text-muted: #94a3b8; --border: #334155; --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.5); }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-body); margin: 0; padding: 20px; color: var(--text-main); transition: background 0.3s ease; }
        .container { max-width: 1300px; margin: 0 auto; }
        header { margin-bottom: 20px; text-align: center; position: relative; }
        header h2 { font-weight: 800; color: var(--primary); margin: 0; font-size: 28px; letter-spacing: -1px; }
        header h3 { color: var(--accent); margin-top: 4px; font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 2px; }
        .dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--card-bg); padding: 20px; border-radius: var(--radius); box-shadow: var(--shadow-md); border-left: 5px solid var(--accent); display: flex; flex-direction: column; }
        .stat-card.spin { border-left-color: var(--spin-color); }
        .stat-card.onix { border-left-color: var(--onix-color); }
        .stat-label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }
        .stat-value { font-size: 24px; font-weight: 800; color: var(--primary); }
        .btn-toggle-dark { position: fixed; top: 20px; right: 20px; z-index: 1000; width: 40px; height: 40px; border-radius: 50%; border: none; background: var(--card-bg); color: var(--text-main); box-shadow: var(--shadow-md); cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
        .card { background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow-md); padding: 25px; margin-bottom: 30px; border: 1px solid var(--border); }
        .card-title { font-size: 1rem; font-weight: 700; color: var(--primary); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .card-title i { width: 6px; height: 20px; background: var(--accent); border-radius: 3px; display: inline-block; }
        .form-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group-full { grid-column: 1 / -1; }
        label { font-size: 11px; font-weight: 700; margin-bottom: 6px; color: var(--secondary); text-transform: uppercase; }
        input, select { padding: 10px 14px; border: 2px solid var(--border); border-radius: 8px; font-size: 14px; color: var(--text-main); background-color: var(--card-bg); }
        input:focus, select:focus { border-color: var(--accent); outline: none; }
        select[multiple] { height: 150px; }
        .helper-text { font-size: 11px; color: var(--text-muted); margin-top: 6px; font-style: italic; }
        .button-container { grid-column: 1 / -1; display: flex; justify-content: flex-end; gap: 10px; }
        .btn-primary { background: var(--accent); color: white; border: none; padding: 12px 30px; border-radius: 8px; cursor: pointer; font-weight: 700; transition: 0.2s; }
        .filter-section { background: #1e293b; padding: 20px; border-radius: var(--radius) var(--radius) 0 0; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 20px; color: white; }
        .table-container { background: var(--card-bg); border-radius: 0 0 var(--radius) var(--radius); box-shadow: var(--shadow-lg); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 1100px; }
        th { background: var(--bg-body); color: var(--text-muted); padding: 15px; text-align: left; font-size: 10px; text-transform: uppercase; border-bottom: 2px solid var(--border); }
        td { padding: 12px 15px; border-bottom: 1px solid var(--border); font-size: 13px; }
        .badge { font-weight: 700; padding: 4px 10px; border-radius: 15px; font-size: 10px; }
        .badge-spin { background: rgba(14, 165, 233, 0.1); color: var(--spin-color); }
        .badge-onix { background: rgba(139, 92, 246, 0.1); color: var(--onix-color); }
    </style>
</head>
<body>

<button class="btn-toggle-dark" onclick="toggleDarkMode()">🌓</button>

<div class="container">
    <header>
        <h2>AGENDA VIATURA</h2>
        <h3>URE Araçatuba</h3>
    </header>

    <div class="dashboard">
        <div class="stat-card">
            <span class="stat-label">Total de Viagens (Mês)</span>
            <span class="stat-value" id="statTotal">0</span>
        </div>
        <div class="stat-card spin">
            <span class="stat-label">Viagens SPIN</span>
            <span class="stat-value" id="statSpin">0</span>
        </div>
        <div class="stat-card onix">
            <span class="stat-label">Viagens ONIX</span>
            <span class="stat-value" id="statOnix">0</span>
        </div>
    </div>

    <div class="card">
        <div class="card-title"><i></i> Novo Registro de Agendamento</div>
        <div class="form-grid">
            <div class="form-group"><label>📅 Saída</label><input type="date" id="dSaida"></div>
            <div class="form-group"><label>🕒 Hora</label><input type="time" id="hSaida"></div>
            <div class="form-group"><label>📅 Retorno</label><input type="date" id="dChegada"></div>
            <div class="form-group"><label>🕒 Hora</label><input type="time" id="hChegada"></div>

            <div class="form-group">
                <label>🚗 Viatura</label>
                <select id="viatura">
                    <option value="SPIN">CHEVROLET SPIN</option>
                    <option value="ONIX">CHEVROLET ONIX</option>
                </select>
            </div>
            <div class="form-group">
                <label>👤 Condutor</label>
                <select id="condutor">
                    <option value="">Selecione...</option>
                    <option value="Marcelo Bevilaqua">Marcelo Bevilaqua</option>
                    <option value="Sandra Vieira">Sandra Vieira</option>
                    <option value="Ágatha">Ágatha</option>
                </select>
            </div>
            <div class="form-group"><label>👥 Passageiro</label><input type="text" id="passageiro"></div>
            <div class="form-group"><label>🏢 Seção</label><input type="text" id="secao"></div>

            <div class="form-group form-group-full">
                <label>📍 Destino</label>
                <select id="destino" multiple>
                    <option value="Andradina">Andradina</option>
                    <option value="Birigui">Birigui</option>
                    <option value="São Paulo">São Paulo</option>
                    <option value="Escola Abranche">Escola Abranche</option>
                </select>
            </div>

            <div class="button-container">
                <button class="btn-primary" onclick="adicionarAgendamento()">Salvar Agendamento</button>
            </div>
        </div>
    </div>

    <div class="filter-section">
        <select id="filtroMes" onchange="renderizarTabela()">
            <option value="01">Janeiro</option><option value="02">Fevereiro</option><option value="03">Março</option>
            <option value="04">Abril</option><option value="05">Maio</option><option value="06">Junho</option>
            <option value="07">Julho</option><option value="08">Agosto</option><option value="09">Setembro</option>
            <option value="10">Outubro</option><option value="11">Novembro</option><option value="12">Dezembro</option>
        </select>
        <select id="filtroAno" onchange="renderizarTabela()">
            <option value="2025">2025</option><option value="2026">2026</option>
        </select>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Saída</th><th>Hora</th><th>Retorno</th><th>Hora</th><th>Destino</th>
                    <th>Viatura</th><th>Condutor</th><th>Passageiro</th><th>Seção</th><th>Status</th>
                </tr>
            </thead>
            <tbody id="corpoTabela"></tbody>
        </table>
    </div>
</div>

<script>
    const URL_DATABASE = "https://script.google.com/macros/s/AKfycbxH3qt5S7GvxAcgGbP3qfe-iHXWyw7_oIZWeDWf5lnJKRG9DSnpB_eiDWiUGvKlvhrz/exec";

    document.addEventListener('DOMContentLoaded', () => {
        const hoje = new Date();
        document.getElementById('filtroMes').value = String(hoje.getMonth() + 1).padStart(2, '0');
        document.getElementById('filtroAno').value = hoje.getFullYear();
        renderizarTabela();
    });

    async function adicionarAgendamento() {
        const destinos = Array.from(document.getElementById('destino').selectedOptions).map(o => o.value);
        const fields = {
            dSaida: document.getElementById('dSaida').value,
            hSaida: document.getElementById('hSaida').value,
            dChegada: document.getElementById('dChegada').value,
            hChegada: document.getElementById('hChegada').value,
            viatura: document.getElementById('viatura').value,
            condutor: document.getElementById('condutor').value,
            passageiro: document.getElementById('passageiro').value,
            secao: document.getElementById('secao').value,
            destino: destinos.join(", ")
        };

        if(!fields.dSaida || !fields.condutor) return alert("Preencha a data e o condutor.");

        try {
            await fetch(URL_DATABASE, { method: 'POST', body: JSON.stringify(fields) });
            alert("Salvo com sucesso!");
            renderizarTabela();
        } catch (e) { alert("Erro ao salvar."); }
    }

    async function renderizarTabela() {
        const corpo = document.getElementById('corpoTabela');
        corpo.innerHTML = "<tr><td colspan='10' style='text-align:center'>Carregando...</td></tr>";
        try {
            const res = await fetch(URL_DATABASE);
            const dados = await res.json();
            corpo.innerHTML = dados.length ? "" : "<tr><td colspan='10' style='text-align:center'>Nenhum dado.</td></tr>";
            dados.forEach(item => {
                corpo.innerHTML += `<tr>
                    <td>${item.dSaida}</td><td>${item.hSaida}</td>
                    <td>${item.dChegada}</td><td>${item.hChegada}</td>
                    <td>${item.destino}</td><td>${item.viatura}</td>
                    <td>${item.condutor}</td><td>${item.passageiro}</td>
                    <td>${item.secao}</td><td>OK</td>
                </tr>`;
            });
        } catch (e) { corpo.innerHTML = "<tr><td colspan='10' style='text-align:center'>Erro ao carregar ou tabela vazia.</td></tr>"; }
    }

    function toggleDarkMode() { document.body.classList.toggle('dark-mode'); }
</script>
</body>
</html>
